<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My VPN Proxy</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin: 0; padding: 50px 20px; }
        h1 { font-size: 2.5em; }
        input { padding: 15px; width: 80%; max-width: 500px; border-radius: 50px; border: none; font-size: 16px; margin: 20px 0; }
        button { padding: 15px 40px; background: white; color: #764ba2; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔒 My VPN Proxy</h1>
    <p>Enter URL to browse:</p>
    <input type="text" id="urlInput" placeholder="https://example.com">
    <br>
    <button onclick="proxy()">Browse</button>
    <script>
        function proxy() {
            const url = document.getElementById('urlInput').value;
            if (url) { window.location.href = '/api/proxy?url=' + encodeURIComponent(url); }
        }
    </script>
</body>
</html>
